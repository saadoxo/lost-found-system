openapi: "3.0.3"
info:
  title: Item Service API
  version: "1.0.0"
  description: CRUD for lost and found item reports. Publishes item_created events to SQS.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        error: { type: string }

    Item:
      type: object
      properties:
        id:          { type: integer }
        type:        { type: string, enum: [lost, found] }
        title:       { type: string }
        description: { type: string }
        category:    { type: string, enum: [electronics, clothing, documents, keys, pets, bags, jewellery, other] }
        location:    { type: string }
        date:        { type: string, format: date }
        imageUrl:    { type: string, format: uri }
        status:      { type: string, enum: [open, matched, claimed, closed] }
        userId:      { type: integer }
        createdAt:   { type: string, format: date-time }

    ItemInput:
      type: object
      required: [type, title, category, location, date]
      properties:
        type:        { type: string, enum: [lost, found] }
        title:       { type: string, minLength: 3, maxLength: 200 }
        description: { type: string, maxLength: 2000 }
        category:    { type: string, enum: [electronics, clothing, documents, keys, pets, bags, jewellery, other] }
        location:    { type: string, maxLength: 300 }
        date:        { type: string, format: date }
        imageKey:    { type: string, description: S3 key returned by Image Service after upload }

paths:
  /items:
    get:
      summary: List items with optional filters
      parameters:
        - name: type
          in: query
          schema: { type: string, enum: [lost, found] }
        - name: category
          in: query
          schema: { type: string }
        - name: location
          in: query
          schema: { type: string }
        - name: dateFrom
          in: query
          schema: { type: string, format: date }
        - name: dateTo
          in: query
          schema: { type: string, format: date }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        "200":
          description: Paginated list of items
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/Item" }
                  total:    { type: integer }
                  page:     { type: integer }
                  pages:    { type: integer }

    post:
      summary: Report a new lost or found item
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ItemInput" }
      responses:
        "201":
          description: Item created — item_created event published to SQS
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Item" }
        "401": { description: Not authenticated }
        "422": { description: Validation failed }

  /items/{id}:
    get:
      summary: Get a single item by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Item found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Item" }
        "404":
          description: Item not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

    put:
      summary: Update an item (owner only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ItemInput" }
      responses:
        "200":
          description: Item updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Item" }
        "403": { description: Not the item owner }
        "404": { description: Item not found }

    delete:
      summary: Delete an item (owner or admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204": { description: Item deleted }
        "403": { description: Not authorized }
        "404": { description: Item not found }

  /items/{id}/claim:
    post:
      summary: Initiate a claim on a found item
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                  maxLength: 1000
                  description: Message to admin explaining why you are claiming this item
      responses:
        "200": { description: Claim submitted — pending admin approval }
        "409": { description: Claim already exists for this item }

  /health:
    get:
      summary: Health check
      responses:
        "200":
          content:
            application/json:
              schema:
                properties:
                  status: { type: string, example: ok }
