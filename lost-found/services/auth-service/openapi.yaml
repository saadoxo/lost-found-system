openapi: "3.0.3"
info:
  title: Auth Service API
  version: "1.0.0"
  description: Handles user registration, login, token refresh, and logout.

# Define the bearer token security scheme once here, reuse it per endpoint
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        error: { type: string }

    UserResponse:
      type: object
      properties:
        id:    { type: integer }
        email: { type: string }
        name:  { type: string }
        role:  { type: string, enum: [user, admin] }

paths:
  /auth/register:
    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, name]
              properties:
                email:
                  type: string
                  format: email
                  example: saad@example.com
                password:
                  type: string
                  minLength: 12
                  description: Must contain uppercase, lowercase, number, and special character
                  example: "MyStr0ng!Pass"
                name:
                  type: string
                  minLength: 2
                  maxLength: 100
                  example: Saad
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                properties:
                  user: { $ref: "#/components/schemas/UserResponse" }
        "409":
          description: Email already registered
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422":
          description: Validation failed (password too weak, invalid email, etc.)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /auth/login:
    post:
      summary: Login and receive access + refresh JWT tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:    { type: string, format: email }
                password: { type: string }
      responses:
        "200":
          description: Login successful — tokens returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                    description: Short-lived JWT (15 minutes). Send in Authorization header.
                  refreshToken:
                    type: string
                    description: Long-lived JWT (7 days). Used only to get a new access token.
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429":
          description: Too many login attempts — rate limited
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /auth/refresh:
    post:
      summary: Get a new access token using a refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        "200":
          description: New access token issued
          content:
            application/json:
              schema:
                properties:
                  accessToken: { type: string }
        "401":
          description: Refresh token invalid or expired
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /auth/logout:
    post:
      summary: Logout — invalidates the refresh token
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logged out successfully
        "401":
          description: Not authenticated

  /auth/me:
    get:
      summary: Get the currently authenticated user's profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserResponse" }
        "401":
          description: Not authenticated

  /health:
    get:
      summary: Health check — used by ECS and ALB
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                properties:
                  status: { type: string, example: ok }

  /ready:
    get:
      summary: Readiness check — confirms DB connection is live
      responses:
        "200":
          description: Service is ready to accept traffic
        "503":
          description: Service not ready (DB unreachable)
