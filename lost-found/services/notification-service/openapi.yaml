openapi: "3.0.3"
info:
  title: Notification Service API
  version: "1.0.0"
  description: >
    Stateless SQS consumer. Listens for match_found events and sends
    email notifications via AWS SES. No database — fully queue-driven.

components:
  schemas:
    NotificationLog:
      type: object
      properties:
        id:         { type: string }
        type:       { type: string, enum: [match_found, claim_approved, claim_rejected] }
        recipient:  { type: string, format: email }
        sentAt:     { type: string, format: date-time }
        status:     { type: string, enum: [sent, failed, bounced] }
        messageId:  { type: string, description: SES message ID for tracking }

paths:
  /notifications/send:
    post:
      summary: Manually send a notification (admin/debug only)
      description: Normally notifications are sent automatically via the SQS consumer.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, recipientEmail, data]
              properties:
                type:
                  type: string
                  enum: [match_found, claim_approved, claim_rejected]
                recipientEmail:
                  type: string
                  format: email
                data:
                  type: object
                  description: Template variables for the email (match details, item info, etc.)
      responses:
        "200":
          description: Notification sent
          content:
            application/json:
              schema:
                properties:
                  messageId: { type: string }
        "400": { description: Invalid notification type or missing template data }

  /health:
    get:
      summary: Health check
      responses:
        "200":
          content:
            application/json:
              schema:
                properties:
                  status: { type: string, example: ok }

  /ready:
    get:
      summary: Readiness — confirms SQS and SES connectivity
      responses:
        "200": { description: Ready }
        "503": { description: Not ready — SQS or SES unreachable }
