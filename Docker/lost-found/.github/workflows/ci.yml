name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION:   us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

jobs:

  build-and-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - name: auth-service
            port: 3001
          - name: item-service
            port: 3002
          - name: search-service
            port: 3003
          - name: matching-service
            port: 3004
          - name: notification-service
            port: 3005
          - name: image-service
            port: 3006
          - name: admin-service
            port: 3007

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build \
            -t $ECR_REGISTRY/lostfound/${{ matrix.service.name }}:${{ github.sha }} \
            -t $ECR_REGISTRY/lostfound/${{ matrix.service.name }}:latest \
            Docker/lost-found/services/${{ matrix.service.name }}

      - name: Push to ECR
        run: |
          docker push $ECR_REGISTRY/lostfound/${{ matrix.service.name }}:${{ github.sha }}
          docker push $ECR_REGISTRY/lostfound/${{ matrix.service.name }}:latest

      - name: Verify health endpoint exists
        run: |
          grep -r "/health" Docker/lost-found/services/${{ matrix.service.name }}/src/ \
            && echo "Health endpoint found" \
            || (echo "WARNING: No health endpoint found" && exit 0)

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Scan auth-service image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/lostfound/auth-service:${{ github.sha }}
          format: table
          exit-code: 0
          severity: HIGH,CRITICAL

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: Docker/lost-found/infrastructure/terraform/environments/dev
        run: terraform init -reconfigure

      - name: Terraform Plan
        working-directory: Docker/lost-found/infrastructure/terraform/environments/dev
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
        run: terraform plan -no-color