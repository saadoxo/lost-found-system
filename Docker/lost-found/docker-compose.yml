services:

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB:       lostfound
      POSTGRES_USER:     lostfound
      POSTGRES_PASSWORD: localdev123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lostfound"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  auth-service:
    build: ./services/auth-service
    ports:
      - "3001:3001"
    environment:
      PORT:               3001
      DB_HOST:            postgres
      DB_PORT:            5432
      DB_NAME:            lostfound
      DB_USER:            lostfound
      DB_PASSWORD:        localdev123
      JWT_ACCESS_SECRET:  local-access-secret-change-in-prod
      JWT_REFRESH_SECRET: local-refresh-secret-change-in-prod
      NODE_ENV:           development
    depends_on:
      postgres:
        condition: service_healthy

  item-service:
    build: ./services/item-service
    ports:
      - "3002:3002"
    environment:
      PORT:               3002
      DB_HOST:            postgres
      DB_PORT:            5432
      DB_NAME:            lostfound
      DB_USER:            lostfound
      DB_PASSWORD:        localdev123
      JWT_ACCESS_SECRET:  local-access-secret-change-in-prod
      JWT_REFRESH_SECRET: local-refresh-secret-change-in-prod
      NODE_ENV:           development
    depends_on:
      postgres:
        condition: service_healthy

  search-service:
    build: ./services/search-service
    ports:
      - "3003:3003"
    environment:
      PORT:     3003
      NODE_ENV: development

  matching-service:
    build: ./services/matching-service
    ports:
      - "3004:3004"
    environment:
      PORT:        3004
      DB_HOST:     postgres
      DB_PORT:     5432
      DB_NAME:     lostfound
      DB_USER:     lostfound
      DB_PASSWORD: localdev123
      REDIS_HOST:  redis
      REDIS_PORT:  6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  notification-service:
    build: ./services/notification-service
    ports:
      - "3005:3005"
    environment:
      PORT: 3005

  image-service:
    build: ./services/image-service
    ports:
      - "3006:3006"
    environment:
      PORT:     3006
      NODE_ENV: development

  admin-service:
    build: ./services/admin-service
    ports:
      - "3007:3007"
    environment:
      PORT:        3007
      DB_HOST:     postgres
      DB_PORT:     5432
      DB_NAME:     lostfound
      DB_USER:     lostfound
      DB_PASSWORD: localdev123
      NODE_ENV:    development
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: