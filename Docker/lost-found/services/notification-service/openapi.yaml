openapi: "3.0.3"
info:
  title: Notification Service API
  version: "1.0.0"
  description: >
    Stateless SQS consumer. Listens for match_found events and sends
    email notifications via AWS SES. No database — fully queue-driven.

components:
  schemas:
    NotificationLog:
      type: object
      description: A record of a notification that was sent or attempted.
      properties:
        id:         { type: string, description: Unique notification ID }
        type:       { type: string, enum: [match_found, claim_approved, claim_rejected], description: Type of notification sent }
        recipient:  { type: string, format: email, description: Email address the notification was sent to }
        sentAt:     { type: string, format: date-time, description: Timestamp when the notification was dispatched }
        status:     { type: string, enum: [sent, failed, bounced], description: Delivery status from SES }
        messageId:  { type: string, description: SES message ID for delivery tracking }

paths:
  /notifications/send:
    post:
      summary: Manually send a notification
      description: >
        Debug/admin endpoint to manually trigger a notification.
        Under normal operation, notifications are sent automatically
        when the SQS consumer receives a match_found event.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, recipientEmail, data]
              properties:
                type:
                  type: string
                  enum: [match_found, claim_approved, claim_rejected]
                  description: The notification template to use
                recipientEmail:
                  type: string
                  format: email
                  description: Email address to send the notification to
                data:
                  type: object
                  description: Template variables injected into the email body (match details, item info, etc.)
      responses:
        "200":
          description: Notification sent successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationLog"
        "400":
          description: Invalid notification type or missing required template data

  /health:
    get:
      summary: Health check
      description: Returns service health. No authentication required.
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                properties:
                  status: { type: string, example: ok }

  /ready:
    get:
      summary: Readiness check
      description: Confirms that the service can reach both SQS and SES before accepting traffic.
      responses:
        "200":
          description: Service is ready to process notifications
        "503":
          description: Not ready — SQS or SES unreachable