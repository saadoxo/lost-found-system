name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION:   us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  ECS_CLUSTER:  lostfound-cluster-dev

jobs:

  build-and-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - name: auth-service
            port: 3001
          - name: item-service
            port: 3002
          - name: search-service
            port: 3003
          - name: matching-service
            port: 3004
          - name: notification-service
            port: 3005
          - name: image-service
            port: 3006
          - name: admin-service
            port: 3007

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build \
            -t $ECR_REGISTRY/lostfound/${{ matrix.service.name }}:${{ github.sha }} \
            -t $ECR_REGISTRY/lostfound/${{ matrix.service.name }}:latest \
            Docker/lost-found/services/${{ matrix.service.name }}

      - name: Push to ECR
        run: |
          docker push $ECR_REGISTRY/lostfound/${{ matrix.service.name }}:${{ github.sha }}
          docker push $ECR_REGISTRY/lostfound/${{ matrix.service.name }}:latest

      - name: Verify health endpoint exists
        run: |
          grep -r "/health" Docker/lost-found/services/${{ matrix.service.name }}/src/ \
            && echo "Health endpoint found" \
            || (echo "WARNING: No health endpoint found" && exit 0)

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Scan auth-service image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/lostfound/auth-service:${{ github.sha }}
          format: table
          exit-code: 0
          severity: HIGH,CRITICAL

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.0"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: Docker/lost-found/infrastructure/terraform/environments/dev
        run: terraform init -reconfigure

      - name: Terraform Plan
        working-directory: Docker/lost-found/infrastructure/terraform/environments/dev
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
        run: terraform plan -no-color

  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: [build-and-push, security-scan]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # auth-service is handled separately via CodeDeploy blue/green below
      - name: Deploy item-service
        run: aws ecs update-service --cluster $ECS_CLUSTER --service lostfound-item-service-dev --force-new-deployment --region $AWS_REGION

      - name: Deploy search-service
        run: aws ecs update-service --cluster $ECS_CLUSTER --service lostfound-search-service-dev --force-new-deployment --region $AWS_REGION

      - name: Deploy matching-service
        run: aws ecs update-service --cluster $ECS_CLUSTER --service lostfound-matching-service-dev --force-new-deployment --region $AWS_REGION

      - name: Deploy notification-service
        run: aws ecs update-service --cluster $ECS_CLUSTER --service lostfound-notification-service-dev --force-new-deployment --region $AWS_REGION

      - name: Deploy image-service
        run: aws ecs update-service --cluster $ECS_CLUSTER --service lostfound-image-service-dev --force-new-deployment --region $AWS_REGION

      - name: Deploy admin-service
        run: aws ecs update-service --cluster $ECS_CLUSTER --service lostfound-admin-service-dev --force-new-deployment --region $AWS_REGION

      - name: Deploy auth-service via CodeDeploy
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition lostfound-auth-service-dev \
            --region $AWS_REGION \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          aws deploy create-deployment \
            --application-name lostfound-ecs-dev \
            --deployment-group-name lostfound-auth-dg-dev \
            --revision "{\"revisionType\":\"AppSpecContent\",\"appSpecContent\":{\"content\":\"{\\\"version\\\":0,\\\"Resources\\\":[{\\\"TargetService\\\":{\\\"Type\\\":\\\"AWS::ECS::Service\\\",\\\"Properties\\\":{\\\"TaskDefinition\\\":\\\"$TASK_DEF\\\",\\\"LoadBalancerInfo\\\":{\\\"ContainerName\\\":\\\"auth-service\\\",\\\"ContainerPort\\\":3001}}}}]}\"}}" \
            --region $AWS_REGION

      - name: Smoke test
        run: |
          sleep 30
          curl -sf http://lostfound-alb-dev-1030859096.us-east-1.elb.amazonaws.com/auth/health \
            && echo "auth-service healthy" \
            || echo "WARNING: auth-service health check failed"
          curl -sf http://lostfound-alb-dev-1030859096.us-east-1.elb.amazonaws.com/items/health \
            && echo "item-service healthy" \
            || echo "WARNING: item-service health check failed"
